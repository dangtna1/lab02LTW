<!DOCTYPE html>
<html>
    <head>
        <title>Basic Calculation</title>
        <meta charSET="utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <style>
            form {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            h1 {
                text-align: center;
            }
            form > div {
                padding-top: 10px;
            }
        </style>
    </head>
    <body>
        <h1>Basic Calculation</h1>
        <form action="#" id="calculation-form-box">
            <p>First number:</p>
            <input type="text" id="first-number" value="">
            <p>Second number:</p>
            <input type="text" id="second-number" value="">
            <div>
                <button type="button" class="btn btn-primary" onClick="document.getElementById('result').value=add(parseFloat(document.getElementById('first-number').value), parseFloat(document.getElementById('second-number').value))">Add(+)</button>
                <button type="button" class="btn btn-primary" onClick="document.getElementById('result').value=subtract(parseFloat(document.getElementById('first-number').value), parseFloat(document.getElementById('second-number').value));">Subtract(-)</button>
                <button type="button" class="btn btn-primary" onClick="document.getElementById('result').value=multiply(parseFloat(document.getElementById('first-number').value), parseFloat(document.getElementById('second-number').value));">Multiply(*)</button>
                <button type="button" class="btn btn-primary" onClick="document.getElementById('result').value=divide(parseFloat(document.getElementById('first-number').value), parseFloat(document.getElementById('second-number').value));">Divide(/)</button>
                <button type="button" class="btn btn-primary" onClick="document.getElementById('result').value=power(parseFloat(document.getElementById('first-number').value), parseFloat(document.getElementById('second-number').value));">Power(^)</button>
            </div>
            <p>The result:</p>
            <input type="text" id="result" onFocus="blur();" value="">
        </form>
        <script>
            function add(a, b) {
                if (isNaN(a) || isNaN(b)) {
                    alert("You must enter enough two numbers");
                    return NaN;
                }
                return a+b;
            }
            function subtract(a,b) {
                if (isNaN(a) || isNaN(b)) {
                    alert("You must enter enough two numbers");
                    return NaN;
                }
                return a-b;
            }
            function multiply(a, b) {
                if (isNaN(a) || isNaN(b)) {
                    alert("You must enter enough two numbers");
                    return NaN;
                }
                return a*b;
            }
            function divide(a, b) {
                if (isNaN(a) || isNaN(b)) {
                    alert("You must enter enough two numbers");
                    return NaN;
                }
                return a/b;
            }
            function power(a, b) {
                if (isNaN(a) || isNaN(b)) {
                    alert("You must enter enough two numbers");
                    return NaN;
                }
                var p=1;
                for (let i=0; i<b; i++) {
                    p*=a;
                }
                return p;
            }
        </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    </body>
</html>
